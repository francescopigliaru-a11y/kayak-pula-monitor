name: Schedule Canary

on:
  push:
    paths:
      - ".github/workflows/schedule-canary.yml"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Print scheduler evidence
        run: |
          echo "event=${{ github.event_name }}"
          date -u
